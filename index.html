<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake X Premium</title>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
  font-family: 'Segoe UI', sans-serif;
  transition:0.3s;
}

body.light{
  background:#f5f5f5;
  color:black;
}

.container{
  text-align:center;
  position:relative;
}

canvas{
  background:#000;
  border-radius:12px;
  box-shadow:0 0 40px rgba(255,255,255,0.1);
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.btn{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  background:white;
  color:black;
}

.overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:15px;
}

.select{
  padding:8px;
  border-radius:6px;
  border:none;
}

.theme{
  position:absolute;
  top:-40px;
  right:0;
  cursor:pointer;
  font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="theme" onclick="toggleTheme()">🌙</div>

<div class="stats">
  <div>Score: <span id="score">0</span></div>
  <div>High: <span id="high">0</span></div>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
  <button class="btn" onclick="changeSpeed(-1)">➖ Speed</button>
  <button class="btn" onclick="changeSpeed(1)">➕ Speed</button>
</div>

<!-- START -->
<div class="overlay" id="startScreen">
  <h2>🐍 Snake X</h2>

  <select id="difficulty" class="select">
    <option value="4">Easy</option>
    <option value="7">Intermediate</option>
    <option value="10">Hard</option>
  </select>

  <button class="btn" onclick="startGame()">Start Game</button>
</div>

<!-- GAME OVER -->
<div class="overlay" id="gameOver" style="display:none">
  <h2>Game Over</h2>
  <button class="btn" onclick="restart()">Restart</button>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
