<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Pro</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle,#0a0a0a,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
  color:white;
}

.container{
  text-align:center;
}

canvas{
  background:#050505;
  box-shadow:0 0 30px rgba(0,255,200,0.2);
  border:1px solid rgba(255,255,255,0.1);
}

.stats{
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}

.overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:rgba(0,0,0,0.8);
  font-size:24px;
  display:none;
}

button{
  margin-top:10px;
  padding:10px 20px;
  background:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="stats">
    <div>Score: <span id="score">0</span></div>
    <div>High: <span id="high">0</span></div>
  </div>

  <canvas id="game" width="400" height="400"></canvas>
</div>

<div class="overlay" id="gameOver">
  Game Over
  <button onclick="restart()">Restart</button>
</div>

<script src="app.js"></script>
</body>
</html>
